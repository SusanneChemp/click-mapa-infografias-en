<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#eef2f7; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px; }
.hint { font-size:.85rem; color:#4a6fa5; text-align:center; margin-bottom:14px; background:#dbeafe; padding:8px 18px; border-radius:20px; display:inline-block; }
.map-wrapper { position:relative; width:100%; max-width:860px; }
.map-wrapper img { width:100%; height:auto; display:block; border-radius:14px; box-shadow:0 10px 40px rgba(0,0,0,.14); }
.hotspot { position:absolute; cursor:pointer; background:transparent; border:none; border-radius:10px; transition:background .2s,box-shadow .2s; z-index:10; }
.hotspot:hover { background:rgba(255,255,255,.22); box-shadow:0 0 0 3px rgba(255,255,255,.5); }
.hotspot:focus { outline:3px solid #2563eb; background:rgba(37,99,235,.12); }
.hotspot-video { position:absolute; cursor:pointer; background:transparent; border:none; border-radius:50%; z-index:10; transition:transform .2s,background .2s; }
.hotspot-video:hover { background:rgba(255,255,255,.25); transform:scale(1.12); box-shadow:0 0 0 4px rgba(255,255,255,.4); }
.hotspot.dev { background:rgba(220,38,38,.3)!important; border:2px dashed red!important; }
.hotspot-video.dev { background:rgba(220,38,38,.3)!important; border:2px dashed red!important; border-radius:50%!important; }
.dlabel { display:none; position:absolute; top:-20px; left:0; background:red; color:#fff; font-size:9px; padding:1px 4px; border-radius:3px; white-space:nowrap; pointer-events:none; z-index:200; }
.hotspot.dev .dlabel, .hotspot-video.dev .dlabel { display:block; }
#devBtn { position:fixed; top:10px; left:10px; background:#111; color:#fff; font-size:10px; padding:4px 9px; border:none; border-radius:5px; cursor:pointer; opacity:.5; z-index:999; }
#devBtn:hover { opacity:1; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.48); z-index:100; backdrop-filter:blur(3px); }
.overlay.on { display:block; }
.panel { position:fixed; top:0; right:-460px; width:430px; max-width:96vw; height:100vh; background:#fff; z-index:200; transition:right .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:-6px 0 48px rgba(0,0,0,.2); border-radius:18px 0 0 18px; }
.panel.on { right:0; }
.panel-head { background:linear-gradient(135deg,#1a3a8a,#1d6fd8); color:#fff; padding:30px 24px 22px; position:relative; flex-shrink:0; border-radius:18px 0 0 0; }
.pbadge { font-size:10px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; opacity:.7; margin-bottom:7px; }
.ptitle { font-size:1.3rem; font-weight:700; line-height:1.3; padding-right:38px; }
.closebtn { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.18); border:none; color:#fff; width:34px; height:34px; border-radius:50%; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; }
.closebtn:hover { background:rgba(255,255,255,.35); }
.panel-body { padding:20px 24px; overflow-y:auto; flex:1; }
.panel-body ul { list-style:none; }
.panel-body li { padding:13px 0 13px 22px; border-bottom:1px solid #f1f5f9; color:#1e3a5f; font-size:.96rem; line-height:1.55; position:relative; }
.panel-body li:last-child { border-bottom:none; }
.panel-body li::before { content:''; position:absolute; left:0; top:21px; width:9px; height:9px; border-radius:50%; background:#1d6fd8; }
.panel-foot { padding:14px 24px; background:#f8fafc; border-top:1px solid #e2e8f0; font-size:11px; color:#94a3b8; text-align:center; flex-shrink:0; }
@media(max-width:580px){ .panel{width:100vw;border-radius:18px 18px 0 0;top:auto;bottom:-100vh;right:0;height:72vh;transition:bottom .3s cubic-bezier(.4,0,.2,1);} .panel.on{bottom:0;} }
</style>

<script>
const data=[
  {badge:"SECTOR 1",title:"Sustainable Fishing and Aquaculture",items:["Responsible fishing techniques","Reduction of discards","Respect for species and protected ecosystems","Multitrophic farming","Animal welfare","Water recirculation"]},
  {badge:"SECTOR 2",title:"Market of Origin",items:["Good handling practices","Food safety hygiene","Catch control","Quality labels"]},
  {badge:"SECTOR 3",title:"Transport",items:["Efficient cold chain","Reduction of the carbon footprint","Eco-friendly packaging"]},
  {badge:"SECTOR 4",title:"Marketing and Transformation",items:["Canned goods, frozen products, transformed products","Discarded products that cannot be used for human consumption: fish meal and fish oil, products for other industries, fertilizers for agriculture, feed for aquaculture and livestock","Recycled: recycled plastics, cork boxes, nets","Fresh products","Local market and employment","Identification"]},
  {badge:"SECTOR 5",title:"Consumption",items:["Healthy and safe seafood and aquaculture products","Traceability (provenance)","Nutritional quality"]},
  {badge:"SECTOR 6",title:"Positive Impact",items:["Local trade and tradition","Zero waste","Lower environmental impact, reduce climate change"]},
  {badge:"SECTOR 7",title:"Recovery of Marine and Coastal Ecosystems",items:["Biodiversity","Protection of aquaculture areas","Marine reserves","Fishing reserves"]}
];
function openP(i){
  const d=data[i];
  document.getElementById("pBadge").textContent=d.badge;
  document.getElementById("pTitle").textContent=d.title;
  document.getElementById("pList").innerHTML=d.items.map(x=>"<li>"+x+"</li>").join("");
  document.getElementById("panel").classList.add("on");
  document.getElementById("overlay").classList.add("on");
  document.body.style.overflow="hidden";
}
function closeP(){
  document.getElementById("panel").classList.remove("on");
  document.getElementById("overlay").classList.remove("on");
  document.body.style.overflow="";
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeP();});
let dev=false;
function toggleDev(){
  dev=!dev;
  document.querySelectorAll(".hotspot,.hotspot-video").forEach(h=>h.classList.toggle("dev",dev));
  document.getElementById("devBtn").textContent=dev?"🔧 ON":"🔧 Dev";
}
</script>
